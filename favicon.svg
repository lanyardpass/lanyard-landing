<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- App icon background -->
  <rect width="100" height="100" rx="22" fill="#2D6A4F"/>
  <!-- Badge body -->
  <rect x="27" y="20" width="46" height="64" rx="7" fill="#1B4332" stroke="#52B788" stroke-width="3.5"/>
  <!-- Clip mechanism - outer -->
  <rect x="36" y="13" width="28" height="12" rx="5" fill="#1B4332" stroke="#52B788" stroke-width="3"/>
  <!-- Clip mechanism - inner filled bar -->
  <rect x="42" y="15" width="16" height="7" rx="2.5" fill="#52B788"/>
  <!-- Y letterform -->
  <text
    x="50" y="74"
    font-family="Montserrat, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="42"
    fill="#FFFFFF"
    text-anchor="middle"
  >Y</text>
