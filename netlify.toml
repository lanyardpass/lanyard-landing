# Netlify config for lanyardpass.com (Astro static build + standalone functions).
#
# Redesign note: the site was previously hand-built static HTML (publish=".").
# It is now an Astro project that builds to dist/. The beta form remains a
# standalone Netlify Function (netlify/functions/beta.mjs) — independent of
# Astro — so no SSR adapter is required.
#
# Branch deploys (e.g. the `redesign` branch) get their own live *.netlify.app
# URL and are automatically served with X-Robots-Tag: noindex by Netlify, so
# WIP is never indexed. Production (main) deploys to lanyardpass.com.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Pretty endpoint for the beta form POST.
[[redirects]]
  from = "/api/beta"
  to = "/.netlify/functions/beta"
  status = 200
  force = true

# Carried-over static pages live in public/ as .html — serve them at clean
# URLs (Netlify does this by default, but make it explicit so dev and prod
# behave the same and the contract is documented).
[[redirects]]
  from = "/beta"
  to = "/beta.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# Long-cache build-hashed assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep non-production deploys out of search indexes. Netlify auto-noindexes
# Deploy Previews and OLD branch deploys, but the MOST RECENT branch deploy is
# indexable by default — so we force noindex on these contexts ourselves. The
# Layout reads PUBLIC_NOINDEX to emit <meta name="robots" content="noindex">.
# Production (main) leaves it unset, so the live site stays indexable.
[context.branch-deploy.environment]
  PUBLIC_NOINDEX = "true"

[context.deploy-preview.environment]
  PUBLIC_NOINDEX = "true"
