# Netlify config for lanyardpass.com (Astro SSR via @astrojs/netlify).
#
# The site is an Astro project building to dist/. SSR + the form/admin routes
# (and Netlify Blobs storage) are handled by the adapter — no standalone
# functions config needed; the adapter generates the serverless function.
#
# Branch deploys (e.g. the `redesign` branch) get their own live *.netlify.app
# URL and are automatically served with X-Robots-Tag: noindex by Netlify, so
# WIP is never indexed. Production (main) deploys to lanyardpass.com.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# /beta is still the carried-over static page (public/beta.html); serve it at a
# clean URL. /privacy is now an Astro page, so it needs no redirect.
[[redirects]]
  from = "/beta"
  to = "/beta.html"
  status = 200

# Long-cache build-hashed assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep non-production deploys out of search indexes. Netlify auto-noindexes
# Deploy Previews and OLD branch deploys, but the MOST RECENT branch deploy is
# indexable by default — so we force noindex on these contexts ourselves. The
# Layout reads PUBLIC_NOINDEX to emit <meta name="robots" content="noindex">.
# Production (main) leaves it unset, so the live site stays indexable.
[context.branch-deploy.environment]
  PUBLIC_NOINDEX = "true"

[context.deploy-preview.environment]
  PUBLIC_NOINDEX = "true"
